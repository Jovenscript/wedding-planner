<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FAF9F6">
  <title>Wedding Planner SaaS</title>

  <link rel="manifest" href="manifest.webmanifest">

  <!-- Libs -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase Compat -->
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: '#D4AF37',
            'gold-soft': '#E6C76B',
            blush: '#F8E8E8',
            offwhite: '#FAF9F6',
            dark: '#1F1F1F',
            muted: '#6B6B6B'
          },
          fontFamily: {
            serif: ['Playfair Display', 'serif'],
            sans: ['Inter', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-offwhite text-dark font-sans antialiased selection:bg-gold selection:text-white">

  <!-- ====================================================
       LOGIN / SIGNUP
       ==================================================== -->
  <div id="auth-screen" class="fixed inset-0 z-[200] bg-offwhite flex items-center justify-center p-4">
    <div class="glass-card p-8 rounded-3xl max-w-sm w-full shadow-2xl border-t-4 border-gold">
      <div class="text-center mb-6">
        <h1 class="text-3xl font-bold text-gold tracking-widest uppercase font-serif">Wedding</h1>
        <p class="text-xs text-muted tracking-widest">Planner SaaS</p>
      </div>

      <h2 id="auth-title" class="text-lg font-bold mb-4 text-center">Acesse sua conta</h2>

      <form id="auth-form" class="space-y-3">
        <div id="auth-name-wrapper" class="relative hidden">
          <i class="fa-solid fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="text" id="auth-name" placeholder="Seu nome" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:ring-2 focus:ring-gold outline-none text-sm">
        </div>
        <div class="relative">
          <i class="fa-solid fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="email" id="auth-email" placeholder="E-mail" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:ring-2 focus:ring-gold outline-none text-sm" required>
        </div>
        <div class="relative">
          <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
          <input type="password" id="auth-password" placeholder="Senha" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-200 bg-white/80 focus:ring-2 focus:ring-gold outline-none text-sm" required minlength="6">
        </div>
        <button type="submit" id="auth-submit" class="w-full bg-dark text-white font-bold py-3 rounded-xl shadow-lg hover:bg-black transition flex items-center justify-center gap-2">
          Entrar <i class="fa-solid fa-arrow-right"></i>
        </button>
      </form>

      <div class="mt-5 text-sm text-muted text-center">
        <span id="auth-toggle-text">Não tem uma conta?</span>
        <button id="auth-toggle-btn" class="text-gold font-bold hover:underline ml-1">Criar agora</button>
      </div>

      <button id="auth-forgot" class="block w-full text-center text-xs text-muted mt-3 hover:underline">Esqueci minha senha</button>
    </div>
  </div>

  <!-- ====================================================
       ONBOARDING — primeiro casamento
       ==================================================== -->
  <div id="onboarding-screen" class="fixed inset-0 z-[180] bg-offwhite flex items-center justify-center p-4 hidden">
    <div class="glass-card p-8 rounded-3xl max-w-md w-full shadow-2xl">
      <h1 class="text-2xl font-bold font-serif text-dark text-center">Vamos começar 💍</h1>
      <p class="text-sm text-muted text-center mb-6">Cria o teu primeiro casamento. Você pode ter quantos quiser depois.</p>

      <form id="onboarding-form" class="space-y-3">
        <div>
          <label class="block text-xs font-semibold text-muted uppercase mb-1">Nomes dos noivos</label>
          <input type="text" id="onb-names" placeholder="Ex: Marlon &amp; Caroline" class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-gold outline-none text-sm" required>
        </div>
        <div>
          <label class="block text-xs font-semibold text-muted uppercase mb-1">Data do casamento</label>
          <input type="date" id="onb-date" class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-gold outline-none text-sm" required>
        </div>
        <div>
          <label class="block text-xs font-semibold text-muted uppercase mb-1">Local (opcional)</label>
          <input type="text" id="onb-place" placeholder="Cidade ou nome do espaço" class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-gold outline-none text-sm">
        </div>
        <button type="submit" class="w-full bg-gold text-white font-bold py-3 rounded-xl shadow-lg hover:bg-yellow-600 transition mt-2">
          Criar casamento <i class="fa-solid fa-rings-wedding ml-2"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- ====================================================
       APP SHELL (escondida até autenticar)
       ==================================================== -->
  <nav id="sidebar" class="glass-nav fixed w-full sm:w-64 sm:h-screen bottom-0 sm:bottom-auto sm:left-0 z-50 flex sm:flex-col items-center sm:items-start justify-start overflow-x-auto sm:overflow-y-auto sm:p-6 transition-all gap-2 sm:gap-0 px-4 py-2 sm:py-0 hidden-app">

    <!-- Header (desktop) -->
    <div class="hidden sm:block w-full mb-4 text-center relative">
      <h1 class="text-2xl font-bold text-gold tracking-widest uppercase">Wedding</h1>
      <p class="text-xs text-muted tracking-widest mt-1">Planner</p>
    </div>

    <!-- Wedding switcher -->
    <div id="wedding-switcher" class="hidden sm:block w-full mb-6">
      <button id="wedding-switcher-btn" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-left hover:border-gold transition flex items-center justify-between group">
        <div class="overflow-hidden">
          <div class="text-[10px] text-muted uppercase tracking-widest">Casamento ativo</div>
          <div id="active-wedding-name" class="text-sm font-bold truncate">—</div>
        </div>
        <i class="fa-solid fa-chevron-down text-xs text-muted group-hover:text-gold"></i>
      </button>
    </div>

    <!-- Nav items (rendered by router based on permissions) -->
    <div id="nav-items" class="contents"></div>

    <!-- Plan badge + user footer -->
    <div class="hidden sm:block w-full mt-auto pt-4 border-t border-gray-100">
      <div id="plan-badge" class="mb-3 px-3 py-2 rounded-xl text-xs font-bold text-center bg-blush text-gold">FREE</div>
      <button id="user-menu-btn" class="w-full flex items-center gap-2 p-2 rounded-xl hover:bg-blush transition text-left">
        <div id="user-avatar" class="w-8 h-8 rounded-full bg-gold text-white flex items-center justify-center font-bold text-sm flex-shrink-0">?</div>
        <div class="overflow-hidden flex-grow">
          <div id="user-name-display" class="text-xs font-bold truncate">—</div>
          <div id="user-email-display" class="text-[10px] text-muted truncate">—</div>
        </div>
        <i class="fa-solid fa-ellipsis-vertical text-xs text-muted"></i>
      </button>
    </div>

    <!-- Mobile sair -->
    <button id="mobile-logout" class="sm:hidden nav-btn flex-shrink-0 flex flex-col items-center p-2 rounded-xl text-gray-500 hover:text-red-500">
      <i class="fa-solid fa-right-from-bracket text-lg"></i>
      <span class="text-[10px] font-semibold mt-1 uppercase">Sair</span>
    </button>
  </nav>

  <!-- ====================================================
       MAIN CONTENT
       ==================================================== -->
  <main id="main-content" class="sm:ml-64 p-4 sm:p-10 pb-24 sm:pb-10 min-h-screen relative hidden-app">

    <!-- Top bar -->
    <header class="flex justify-between items-center mb-6 glass-card p-5 rounded-2xl">
      <div class="overflow-hidden">
        <h2 id="couple-name" class="text-2xl sm:text-3xl font-bold font-serif truncate">Carregando…</h2>
        <p id="countdown" class="text-gold font-semibold mt-1 text-sm flex items-center gap-2">
          <i class="fa-regular fa-clock"></i> <span>—</span>
        </p>
      </div>
      <div class="hidden sm:flex items-center gap-3">
        <div id="role-badge" class="text-[10px] uppercase tracking-widest px-3 py-1 rounded-full bg-blush text-gold font-bold">—</div>
        <div class="text-right">
          <div class="text-xs text-muted"><i class="fa-solid fa-cloud text-green-500 mr-1"></i> Sincronizado</div>
        </div>
      </div>
    </header>

    <!-- Free plan ad banner (only on free) -->
    <div id="ad-banner" class="hidden mb-4 p-3 rounded-xl border border-dashed border-gold/40 bg-gold/5 flex items-center justify-between text-sm">
      <span class="text-muted"><i class="fa-solid fa-crown text-gold mr-2"></i>Você está no plano <b>Free</b>. Libere todos os módulos no Premium.</span>
      <button id="upgrade-btn" class="bg-gold text-white px-4 py-1.5 rounded-lg text-xs font-bold hover:bg-yellow-600 transition">Fazer upgrade</button>
    </div>

    <!-- View container — modules render here -->
    <div id="view-container"></div>

  </main>

  <!-- FAB -->
  <button id="fab-btn" class="fixed bottom-24 sm:bottom-10 right-6 w-14 h-14 bg-gradient-to-tr from-gold to-yellow-400 rounded-full shadow-[0_10px_25px_rgba(212,175,55,0.5)] text-white text-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-40 hidden-app">
    <i class="fa-solid fa-plus"></i>
  </button>

  <!-- Scripts (ordem importa: config → state → db → auth → permissions → ui → router → modules → app) -->
  <script src="config.js"></script>
  <script src="state.js"></script>
  <script src="db.js"></script>
  <script src="auth.js"></script>
  <script src="permissions.js"></script>
  <script src="ui.js"></script>
  <script src="router.js"></script>
  <script src="modules.js"></script>
  <script src="app.js"></script>
</body>
</html>
